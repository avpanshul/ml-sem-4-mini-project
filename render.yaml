services:
  - type: web
    runtime: static
    name: ml-sem-4-mini-project-frontend
    plan: free
    rootDir: front end
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
